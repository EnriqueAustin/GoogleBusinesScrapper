<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Dashboard — Google Business Scraper</title>
  <meta name="description" content="View and filter scraped Google Business leads">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">◉</span>
        <h1>Lead Dashboard</h1>
      </div>
      <p class="subtitle">Google Business Scraper</p>
    </div>
  </header>

  <!-- Stats Cards -->
  <section class="stats-grid" id="statsGrid">
    <div class="stat-card stat-total">
      <div class="stat-icon">📊</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total Leads</div>
    </div>
    <div class="stat-card stat-prospect">
      <div class="stat-icon">🎯</div>
      <div class="stat-value" id="statNoWebsite">—</div>
      <div class="stat-label">No Website (Prospects!)</div>
    </div>
    <div class="stat-card stat-website">
      <div class="stat-icon">🌐</div>
      <div class="stat-value" id="statWithWebsite">—</div>
      <div class="stat-label">Has Website</div>
    </div>
    <div class="stat-card stat-categories">
      <div class="stat-icon">📁</div>
      <div class="stat-value" id="statCategories">—</div>
      <div class="stat-label">Categories</div>
    </div>
  </section>

  <!-- Filters -->
  <section class="filters-bar" id="filtersBar">
    <div class="filter-group">
      <label for="filterSearch">Search</label>
      <input type="text" id="filterSearch" placeholder="Name, address, phone..." autocomplete="off">
    </div>
    <div class="filter-group">
      <label for="filterWebsite">Website Status</label>
      <select id="filterWebsite">
        <option value="all">All</option>
        <option value="no" selected>No Website (Prospects)</option>
        <option value="yes">Has Website</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterQuery">Search Query</label>
      <select id="filterQuery">
        <option value="">All Queries</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterCategory">Category</label>
      <input type="text" id="filterCategory" placeholder="e.g. plumber, salon..." autocomplete="off">
    </div>
    <div class="filter-group">
      <label for="filterRating">Min Rating</label>
      <select id="filterRating">
        <option value="">Any</option>
        <option value="3">3+ ★</option>
        <option value="3.5">3.5+ ★</option>
        <option value="4">4+ ★</option>
        <option value="4.5">4.5+ ★</option>
      </select>
    </div>
    <div class="filter-actions">
      <button id="btnApplyFilters" class="btn btn-primary">Apply</button>
      <button id="btnResetFilters" class="btn btn-ghost">Reset</button>
      <div class="dropdown">
        <button id="btnToggleColumns" class="btn btn-ghost">Columns ⚙</button>
        <div id="columnMenu" class="dropdown-menu">
          <!-- checkboxes populated by JS -->
        </div>
      </div>
      <button id="btnExportCsv" class="btn btn-accent">⬇ Export CSV</button>
    </div>
  </section>

  <!-- Results info -->
  <div class="results-info">
    <span id="resultsCount">0 leads</span>
    <span class="sort-label">Click column headers to sort</span>
  </div>

  <!-- Data Table -->
  <section class="table-container">
    <table class="leads-table" id="leadsTable">
      <thead>
        <tr>
          <th data-sort="name">Name ↕</th>
          <th data-sort="category">Category ↕</th>
          <th data-sort="address">Address ↕</th>
          <th data-sort="phone">Phone ↕</th>
          <th data-sort="website">Website ↕</th>
          <th data-sort="rating">Rating ↕</th>
          <th data-sort="reviewCount">Reviews ↕</th>
          <th data-sort="techStack">Tech Stack ↕</th>
          <th data-sort="seoStatus">SEO ↕</th>
          <th data-sort="query">Query ↕</th>
        </tr>
      </thead>
      <tbody id="leadsBody">
        <tr>
          <td colspan="8" class="empty-state">Loading leads...</td>
        </tr>
      </tbody>
    </table>
  </section>

  <!-- Lead Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="leadModal">
      <button class="modal-close" id="modalClose">✕</button>
      <h2 class="modal-title" id="modalTitle">Business Name</h2>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
